<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://kit.fontawesome.com/6eab70c0fb.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <section>
      <nav class="navbar navbar-expand-lg bg-black py-3">
        <div class="container">
        <i class="fa-solid fa-gamepad main-color fa-lg me-2"></i>
          <a class="navbar-brand main-color" style="font-weight: bold;" href="#">GamesArena</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active main-color" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">OUR GAMES</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">What We Do</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Our Team</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Contact Us</a>
              </li>
            </ul>
            <i class="fa-regular fa-bell me-3 fa-lg" style="color: #ffffff;"></i>
            <i class="fa-regular fa-message me-3 fa-lg" style="color: #ffffff;"></i>
              <button class="btn" type="submit">
                Sign In
              </button>
          </div>
        </div>
      </nav>
    </section>
    <div class="section">
      <div class="hero w-100 vh-100 py-4">
        <div class="container d-flex align-content-center justify-content-between">
          <div class="hero-l w-50">
            <h1 class="fs-1">
              THE ULTIMATE <br> <span class="main-color">GAMING</span> <br>EXPERIENCE
            </h1>
          </div>
          <div class="hero-r w-50">
            <img src="./images/hero-img.png" class="w-75 object-fit-contain" alt="">
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
